<!DOCTYPE html>
<html>
<head>
    <title>RootTask - Register</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <h1>RootTask</h1>
        <h2>Create Account</h2>
        <input id="username" placeholder="Username">
        <div class="password-container">
            <input id="password" type="password" placeholder="Password">
            <i class="fas fa-eye" id="eyeIcon" onclick="togglePassword()"></i>
        </div>
        <button class="btn-primary" onclick="register()">Register</button>
        <p class="auth-footer">Already have an account? <a href="login.html">Login</a></p>
    </div>
    <footer class="footer">© 2026 RootTask — Plan Smart. Work Better.</footer>
    <script src="script.js"></script>
</body>
</html>
