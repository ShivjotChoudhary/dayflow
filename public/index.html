<!DOCTYPE html>
<html>
<head>
    <title>DayFlow - Today</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <h2>DayFlow</h2>
            <button onclick="loadTasks()"><i class="fas fa-calendar-day"></i> Today</button>
            <button onclick="showCompleted()"><i class="fas fa-check-circle"></i> Completed</button>
            <button onclick="location.href='history.html'"><i class="fas fa-history"></i> History</button>
            <button onclick="logout()" style="margin-top:auto"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
        <div class="main">
            <h1 id="viewTitle">Today's Plan</h1>
            <div class="task-input" id="inputArea">
                <input type="text" id="taskInput" placeholder="What needs to be done?" style="flex:2">
                <input type="date" id="date">
                <input type="time" id="time">
                <button class="btn-primary" onclick="addTask()" style="width:auto; margin-top:0;">Add Task</button>
            </div>
            <div id="emptyState" class="empty-state" style="display:none;">
                <img src="https://cdn-icons-png.flaticon.com/512/4076/4076478.png" width="100">
                <h3 id="emptyTitle">All clear!</h3>
                <p id="emptyText">No pending tasks for today.</p>
            </div>
            <div id="taskList"></div>
        </div>
    </div>
    <footer class="footer">© 2026 DayFlow — Plan Smart. Work Better.</footer>
    <script src="script.js"></script>
</body>
<div id="congratsToast" class="congrats-toast">
    🎉 Congratulations! Task Completed!
</div>
</html>
