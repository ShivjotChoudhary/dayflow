<!DOCTYPE html>
<html>
<head>
    <title>DayFlow - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <h1>DayFlow</h1>
        <h2>Login</h2>
        <input id="username" placeholder="Username">
        <div class="password-container">
            <input id="password" type="password" placeholder="Password">
            <i class="fas fa-eye" id="eyeIcon" onclick="togglePassword()"></i>
        </div>
        <button class="btn-primary" onclick="login()">Login</button>
        <p class="auth-footer">Don't have an account? <a href="register.html">Register</a></p>
    </div>
    <footer class="footer">© 2026 DayFlow — Plan Smart. Work Better.</footer>
    <script src="script.js"></script>
</body>
</html>
